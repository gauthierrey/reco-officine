<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recos Officine</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#f0f2f5;
  --surface:#fff;
  --border:#e4e7ec;
  --text:#111;
  --muted:#6b7280;
  --navy:#1e3a5f;
  --radius:12px;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:Inter;
  background:var(--bg);
}

.header{
  background:var(--navy);
  padding:20px;
  color:white;
}

.main{
  max-width:800px;
  margin:auto;
  padding:16px;
}

/* CARD */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:16px;
  margin-bottom:12px;
}

/* INPUT */
.search{
  display:flex;
  gap:8px;
}

input{
  flex:1;
  padding:12px;
  border-radius:8px;
  border:1px solid var(--border);
}

/* BUTTON */
button{
  background:var(--navy);
  color:white;
  border:none;
  padding:10px 14px;
  border-radius:8px;
  cursor:pointer;
}

/* AUTOCOMPLETE */
.ac{
  position:absolute;
  background:white;
  border:1px solid var(--border);
  width:100%;
  display:none;
  z-index:10;
}

.ac div{
  padding:10px;
  cursor:pointer;
}

.ac div:hover{
  background:#f3f4f6;
}

/* FILTERS */
.filters{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
}

.tag{
  padding:6px 10px;
  border:1px solid var(--border);
  border-radius:20px;
  cursor:pointer;
  font-size:12px;
}

.tag.active{
  background:var(--navy);
  color:white;
}

/* RESULT */
.result{
  border-left:4px solid var(--navy);
  padding:12px;
  margin-top:10px;
  background:white;
  cursor:pointer;
}

.hidden{display:none}

.small{font-size:12px;color:var(--muted)}
</style>
</head>

<body>

<div class="header">
  <h2>Recommandations officine</h2>
</div>

<div class="main">

<!-- API -->
<div class="card" id="apiCard">
  <h3>Clé API Anthropic</h3>
  <input id="apiKey" placeholder="sk-ant-..." />
  <button onclick="saveKey()">Valider</button>
  <div class="small">stockée localement</div>
</div>

<!-- SEARCH -->
<div class="card">

  <div class="search">
    <input id="input" placeholder="Pathologie..." oninput="ac()">
    <button onclick="search()">OK</button>
  </div>

  <div class="ac" id="ac"></div>

  <div class="filters" id="filters"></div>

</div>

<div id="results"></div>

</div>

<script>

let apiKey = localStorage.getItem("api") || "";
let controller = null;
let active = new Set();

const sources = [
  {id:"has",label:"HAS"},
  {id:"ansm",label:"ANSM"},
  {id:"spf",label:"SPF"},
  {id:"vidal",label:"VIDAL"}
];

const pathos = [
 "Diabète type 2","Hypertension artérielle","Asthme","BPCO",
 "Dépression","Migraine","Insomnie","Reflux gastro-œsophagien"
];

init();

function init(){
  if(apiKey){
    document.getElementById("apiCard").style.display="none";
  }

  sources.forEach(s=>{
    active.add(s.id);
    const d=document.createElement("div");
    d.className="tag active";
    d.textContent=s.label;
    d.onclick=()=>toggle(s.id,d);
    document.getElementById("filters").appendChild(d);
  });
}

function toggle(id,el){
  if(active.has(id)){
    active.delete(id);
    el.classList.remove("active");
  }else{
    active.add(id);
    el.classList.add("active");
  }
}

function saveKey(){
  apiKey=document.getElementById("apiKey").value;
  localStorage.setItem("api",apiKey);
  document.getElementById("apiCard").style.display="none";
}

function ac(){
  const v=document.getElementById("input").value.toLowerCase();
  const box=document.getElementById("ac");

  if(v.length<2){
    box.style.display="none";
    return;
  }

  const r=pathos.filter(x=>x.toLowerCase().includes(v));

  box.innerHTML=r.map(x=>`<div onclick="pick('${x}')">${x}</div>`).join("");
  box.style.display="block";
}

function pick(v){
  document.getElementById("input").value=v;
  document.getElementById("ac").style.display="none";
  search();
}

async function search(){

  const q=document.getElementById("input").value;
  if(!q) return;

  if(controller) controller.abort();
  controller=new AbortController();

  document.getElementById("results").innerHTML="Chargement...";

  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    signal:controller.signal,
    headers:{
      "x-api-key":apiKey,
      "anthropic-version":"2023-06-01",
      "content-type":"application/json"
    },
    body:JSON.stringify({
      model:"claude-sonnet-4-5-20250929",
      max_tokens:1200,
      system:"Répond uniquement JSON array",
      messages:[{role:"user",content:`${q} sources:${[...active].join(",")}`}]
    })
  });

  const data=await res.json();

  let txt=data.content?.[0]?.text||"[]";

  let json=[];
  try{json=JSON.parse(txt.replace(/```/g,""))}catch{}

  render(json);
}

function render(data){
  const el=document.getElementById("results");

  if(!data.length){
    el.innerHTML="Aucun résultat";
    return;
  }

  el.innerHTML=data.map(r=>`
    <div class="result" onclick="this.classList.toggle('open')">
      <b>${r.title}</b>
      <div class="hidden">${r.summary||""}</div>
    </div>
  `).join("");
}

</script>

</body>
</html>
