<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test</title>
</head>
<body>
<h2>Test bouton</h2>
<input id="keyInput" type="password" placeholder="Colle ta clé ici" style="width:300px;padding:8px;font-size:14px"/>
<button onclick="saveKey()" style="padding:8px 16px;font-size:14px;margin-left:8px">Valider</button>
<div id="result" style="margin-top:16px;font-size:14px;color:green"></div>
<script>
function saveKey(){
  var v = document.getElementById("keyInput").value.trim();
  if(v.length < 5){ alert("Trop court"); return; }
  document.getElementById("result").textContent = "Clé reçue : " + v.substring(0,10) + "...";
}
</script>
</body>
</html>
