<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test2</title>
</head>
<body>
<h2>Test localStorage</h2>
<input id="k" type="password" placeholder="Colle ta cle" style="width:280px;padding:8px;font-size:14px;display:block;margin-bottom:8px"/>
<button onclick="test()" style="padding:8px 16px;font-size:14px">Valider</button>
<div id="out" style="margin-top:12px;font-size:13px"></div>
<script>
function test() {
  var out = document.getElementById("out");
  var v = document.getElementById("k").value;
  out.innerHTML = "Valeur lue: " + v.length + " caracteres<br>";
  try {
    localStorage.setItem("test_key", v);
    out.innerHTML += "localStorage OK<br>";
  } catch(e) {
    out.innerHTML += "localStorage ERREUR: " + e.message + "<br>";
  }
  out.innerHTML += "Cle: " + v.substring(0,15) + "...<br>";
  out.innerHTML += "<strong style='color:green'>Bouton fonctionne !</strong>";
}
</script>
</body>
</html>
